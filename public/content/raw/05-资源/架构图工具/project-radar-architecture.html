<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Project Radar 工作架构（V0）</title>
  <style>
    :root {
      color-scheme: light;
      --page: #f5f7fb;
      --surface: #ffffff;
      --ink: #171b24;
      --muted: #5c6678;
      --blue: #1769e0;
      --blue-soft: #eef5ff;
      --orange: #e35316;
      --orange-soft: #fff6ef;
      --green: #167a32;
      --green-soft: #f1fbf3;
      --violet: #6d35c7;
      --line: #202631;
      --border: #d7dde8;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--page);
      color: var(--ink);
      font-family: Inter, "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
      letter-spacing: 0;
    }

    .page {
      width: min(100%, 1760px);
      margin: 0 auto;
      padding: 20px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 12px;
    }

    .title-group h1 {
      margin: 0;
      font-size: 26px;
      line-height: 1.25;
      font-weight: 760;
    }

    .title-group p {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .actions {
      display: flex;
      gap: 8px;
      flex: 0 0 auto;
    }

    button {
      min-height: 36px;
      padding: 0 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--surface);
      color: var(--ink);
      font: inherit;
      font-size: 13px;
      cursor: pointer;
    }

    button:hover { border-color: #aeb8c8; }
    button:focus-visible { outline: 3px solid #9ec5ff; outline-offset: 2px; }

    .canvas {
      overflow: auto;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      box-shadow: 0 12px 34px rgba(28, 37, 53, 0.08);
    }

    svg {
      display: block;
      width: 100%;
      min-width: 1240px;
      height: auto;
    }

    .layer { stroke-width: 1.5; }
    .layer-blue { fill: var(--blue-soft); stroke: #6da7f7; }
    .layer-orange { fill: var(--orange-soft); stroke: #f0a276; }
    .layer-green { fill: var(--green-soft); stroke: #78bc87; }

    .layer-title {
      font-size: 25px;
      font-weight: 760;
    }

    .node rect, .node path.card {
      fill: #fff;
      stroke-width: 1.5;
    }

    .blue-node rect { stroke: var(--blue); }
    .orange-node rect { stroke: var(--orange); }
    .green-node rect { stroke: var(--green); }
    .gray-node rect { stroke: #8b94a3; }

    .node-title {
      fill: var(--ink);
      font-size: 17px;
      font-weight: 720;
      text-anchor: middle;
    }

    .node-subtitle {
      fill: #485365;
      font-size: 14px;
      text-anchor: middle;
    }

    .small-label {
      fill: #485365;
      font-size: 14px;
    }

    .lane-label {
      fill: var(--green);
      font-size: 16px;
      font-weight: 720;
    }

    .icon-disc-blue { fill: var(--blue); }
    .icon-disc-orange { fill: var(--orange); }
    .icon-disc-green { fill: var(--green); }
    .icon-disc-violet { fill: var(--violet); }
    .icon-letter { fill: #fff; font-size: 14px; font-weight: 780; text-anchor: middle; }

    .flow {
      fill: none;
      stroke: var(--line);
      stroke-width: 2;
      marker-end: url(#arrow-black);
    }

    .flow-green {
      fill: none;
      stroke: var(--green);
      stroke-width: 2.5;
      marker-end: url(#arrow-green);
    }

    .flow-blue-dashed {
      fill: none;
      stroke: var(--blue);
      stroke-width: 2;
      stroke-dasharray: 8 7;
      marker-end: url(#arrow-blue);
    }

    .input-line {
      fill: none;
      stroke: #3d4654;
      stroke-width: 1.6;
      marker-end: url(#arrow-black);
    }

    .hidden-card {
      fill: #f8f9fb !important;
      stroke: #7e8796 !important;
      stroke-dasharray: 6 5;
    }

    .future-card {
      fill: #fafafa !important;
      stroke: #7e8796 !important;
      stroke-dasharray: 6 5;
    }

    .store-shell {
      fill: #fff;
      stroke: #667181;
      stroke-width: 1.6;
    }

    .store-inner {
      fill: #f7f9fc;
      stroke: #aab3c0;
      stroke-width: 1.2;
    }

    .store-title { fill: var(--ink); font-size: 19px; font-weight: 760; text-anchor: middle; }
    .store-text { fill: #303846; font-size: 14px; }
    .gate-text { fill: #414a5a; font-size: 13px; text-anchor: middle; }
    .arrow-label { fill: #3d4654; font-size: 13px; font-weight: 650; text-anchor: middle; }

    @media (max-width: 760px) {
      .page { padding: 10px; }
      .topbar { align-items: flex-start; }
      .title-group h1 { font-size: 21px; }
      .title-group p { display: none; }
      button { padding: 0 10px; }
    }

    @media print {
      @page { size: landscape; margin: 8mm; }
      body { background: #fff; }
      .page { width: 100%; padding: 0; }
      .topbar { display: none; }
      .canvas { border: 0; box-shadow: none; overflow: visible; }
      svg { min-width: 0; }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="topbar">
      <div class="title-group">
        <h1>Project Radar 工作架构（V0）</h1>
        <p>确定性 HTML/SVG 架构图 · Context Bundle 仅在用户接受后由服务端重建</p>
      </div>
      <div class="actions" aria-label="图表操作">
        <button type="button" id="fitButton" title="适应窗口">适应窗口</button>
        <button type="button" onclick="window.print()" title="打印或导出 PDF">打印 / PDF</button>
      </div>
    </header>

    <section class="canvas" id="canvas" aria-label="Project Radar V0 三层工作架构图">
      <svg id="diagram" viewBox="0 0 1600 1160" role="img" aria-labelledby="diagramTitle diagramDesc">
        <title id="diagramTitle">Project Radar 工作架构 V0</title>
        <desc id="diagramDesc">Post-run 创建 Activity Event，Organizer 将其归入 Item、Non Project 或待分类并更新状态，Analyzer 生成 Radar；用户接受后服务端重建隐藏 Context Bundle 并调用 AgentV3，执行结果形成新 Event 回到 Organizer，但不会递归生成 Radar。</desc>

        <defs>
          <marker id="arrow-black" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#202631"/>
          </marker>
          <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#167a32"/>
          </marker>
          <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#1769e0"/>
          </marker>
        </defs>

        <!-- Layer 1 -->
        <rect class="layer layer-blue" x="20" y="20" width="1560" height="230" rx="8"/>
        <text class="layer-title" x="45" y="62" fill="#1769e0">1. 触发层</text>

        <g class="node blue-node" data-node="post-run">
          <rect x="100" y="92" width="270" height="94" rx="8"/>
          <circle class="icon-disc-blue" cx="135" cy="139" r="22"/>
          <text class="icon-letter" x="135" y="145">QA</text>
          <text class="node-title" x="248" y="126">Post-run（V0）</text>
          <text class="node-subtitle" x="248" y="156">每个完整 QA 结束后触发</text>
        </g>

        <g class="node blue-node" data-node="initial-event">
          <rect x="430" y="92" width="285" height="94" rx="8"/>
          <circle class="icon-disc-blue" cx="465" cy="139" r="22"/>
          <text class="icon-letter" x="465" y="145">E</text>
          <text class="node-title" x="585" y="126">创建 Activity Event</text>
          <text class="node-subtitle" x="585" y="156">processing · 先落壳再整理</text>
        </g>

        <g class="node blue-node" data-node="re-entry">
          <rect x="820" y="92" width="260" height="94" rx="8"/>
          <circle class="icon-disc-blue" cx="855" cy="139" r="22"/>
          <text class="icon-letter" x="855" y="145">R</text>
          <text class="node-title" x="970" y="126">Re-entry</text>
          <text class="node-subtitle" x="970" y="156">只查询已有状态与 Radar</text>
        </g>

        <g class="node gray-node" data-node="v1">
          <rect class="future-card" x="1190" y="78" width="335" height="118" rx="8"/>
          <circle cx="1230" cy="128" r="22" fill="#707886"/>
          <text class="icon-letter" x="1230" y="134">V1</text>
          <text class="node-title" x="1370" y="116">Session End / 夜间重组</text>
          <text class="node-subtitle" x="1370" y="146">后续预整理与全局重组</text>
          <text class="node-subtitle" x="1370" y="174">未来流程 · 不进入 V0 主链路</text>
        </g>

        <path class="flow" data-edge="post-run-to-event" d="M 370 139 H 430"/>

        <!-- Layer 2 -->
        <rect class="layer layer-orange" x="20" y="270" width="1560" height="390" rx="8"/>
        <text class="layer-title" x="45" y="312" fill="#e35316">2. 跨 Session 项目智能层</text>
        <path class="flow" data-edge="event-to-organizer-visible" d="M 572 186 V 300 H 425 V 365"/>

        <g class="node orange-node">
          <rect x="55" y="345" width="230" height="48" rx="7"/>
          <text class="node-title" x="170" y="376">当前 QA</text>
          <rect x="55" y="403" width="230" height="48" rx="7"/>
          <text class="node-title" x="170" y="434">当前 Session 最近 Item</text>
          <rect x="55" y="461" width="230" height="48" rx="7"/>
          <text class="node-title" x="170" y="492">相关 Session 摘要</text>
          <rect x="55" y="519" width="230" height="48" rx="7"/>
          <text class="node-title" x="170" y="550">活跃 Project / Item</text>
          <rect x="55" y="577" width="230" height="48" rx="7"/>
          <text class="node-title" x="170" y="608">Memory / Todo</text>
        </g>

        <g class="node orange-node" data-node="organizer">
          <rect x="330" y="365" width="190" height="215" rx="8"/>
          <circle class="icon-disc-violet" cx="425" cy="416" r="25"/>
          <text class="icon-letter" x="425" y="422">ORG</text>
          <text class="node-title" x="425" y="466">Post-run</text>
          <text class="node-title" x="425" y="489">Organizer</text>
          <text class="node-subtitle" x="425" y="527">归属 Event</text>
          <text class="node-subtitle" x="425" y="549">生成状态补丁</text>
        </g>

        <path class="input-line" d="M 285 369 H 330"/>
        <path class="input-line" d="M 285 427 H 312 V 408 H 330"/>
        <path class="input-line" d="M 285 485 H 312 V 447 H 330"/>
        <path class="input-line" d="M 285 543 H 312 V 496 H 330"/>
        <path class="input-line" d="M 285 601 H 312 V 541 H 330"/>

        <g data-node="state-store">
          <rect class="store-shell" x="610" y="342" width="330" height="260" rx="8"/>
          <text class="store-title" x="775" y="380">Project Radar State Store</text>
          <rect class="store-inner" x="635" y="402" width="280" height="135" rx="6"/>
          <text class="store-text" x="665" y="430">Project</text>
          <text class="store-text" x="690" y="461">└─ Tracked Item</text>
          <text class="store-text" x="720" y="492">└─ Activity Event</text>
          <text class="store-text" x="665" y="518">Activity Event → Non Project / 待分类</text>
          <text class="small-label" x="655" y="565">目标｜进展｜决策｜阻塞｜完成状态</text>
        </g>

        <path class="flow" data-edge="organizer-to-store" d="M 520 472 H 610"/>
        <text class="arrow-label" x="565" y="447">Event 归属</text>
        <text class="arrow-label" x="565" y="463">Item / Project Patch</text>

        <g class="node orange-node" data-node="analyzer">
          <rect x="1000" y="385" width="165" height="170" rx="8"/>
          <circle class="icon-disc-violet" cx="1082" cy="430" r="24"/>
          <text class="icon-letter" x="1082" y="436">AI</text>
          <text class="node-title" x="1082" y="479">Proactive</text>
          <text class="node-title" x="1082" y="502">Analyzer</text>
          <text class="node-subtitle" x="1082" y="531">只发现关键缺口</text>
        </g>

        <g class="node orange-node" data-node="policy-gate">
          <rect x="1215" y="385" width="215" height="170" rx="8"/>
          <circle class="icon-disc-orange" cx="1322" cy="427" r="22"/>
          <text class="icon-letter" x="1322" y="433">G</text>
          <text class="node-title" x="1322" y="472">Policy Gate</text>
          <text class="gate-text" x="1322" y="505">价值｜可行动｜有证据</text>
          <text class="gate-text" x="1322" y="526">去重 / 冷却｜目标 Session｜新鲜度</text>
        </g>

        <g class="node gray-node">
          <rect x="1460" y="350" width="105" height="76" rx="7"/>
          <text class="node-title" x="1512" y="380">不通过</text>
          <text class="node-subtitle" x="1512" y="405">保持安静</text>
        </g>

        <g class="node green-node" data-node="radar-item">
          <rect x="1450" y="463" width="120" height="126" rx="8"/>
          <text class="node-title" x="1510" y="496">持久化</text>
          <text class="node-title" x="1510" y="519">Radar Item</text>
          <text class="node-subtitle" x="1510" y="548">包含</text>
          <text class="node-subtitle" x="1510" y="569">context_snapshot</text>
        </g>

        <path class="flow" d="M 940 472 H 1000"/>
        <path class="flow" d="M 1165 472 H 1215"/>
        <path class="flow" d="M 1430 445 H 1445 V 388 H 1460"/>
        <path class="flow-green" data-edge="gate-to-radar" d="M 1430 500 H 1450"/>

        <!-- Layer 3 -->
        <rect class="layer layer-green" x="20" y="680" width="1560" height="460" rx="8"/>
        <text class="layer-title" x="45" y="722" fill="#167a32">3. 推送与执行层</text>

        <rect x="42" y="742" width="1515" height="110" rx="7" fill="#fff" stroke="#94c99f"/>
        <text class="lane-label" x="60" y="774">用户可见</text>

        <rect x="42" y="890" width="1515" height="230" rx="7" fill="#f8fbf8" stroke="#94c99f" stroke-dasharray="6 5"/>
        <text class="lane-label" x="60" y="925">服务端隐藏</text>
        <path class="flow-blue-dashed" data-edge="re-entry-to-query-visible" d="M 950 186 V 255 H 35 V 797 H 110"/>

        <g class="node green-node" data-node="radar-query">
          <rect x="110" y="765" width="220" height="64" rx="8"/>
          <text class="node-title" x="220" y="790">Radar 查询</text>
          <text class="node-subtitle" x="220" y="815">有限轮询 / Re-entry</text>
        </g>

        <g class="node green-node">
          <rect x="380" y="765" width="240" height="64" rx="8"/>
          <text class="node-title" x="500" y="790">Action Bar / Radar 详情</text>
          <text class="node-subtitle" x="500" y="815">弹窗纠正｜原因、证据与动作</text>
        </g>

        <g class="node green-node" data-node="accept">
          <rect x="670" y="765" width="160" height="64" rx="8"/>
          <text class="node-title" x="750" y="790">用户接受</text>
          <text class="node-subtitle" x="750" y="815">锁定 Radar</text>
        </g>

        <path class="flow" d="M 330 797 H 380"/>
        <path class="flow" d="M 620 797 H 670"/>
        <path class="flow-green" data-edge="radar-to-query" d="M 1510 589 V 705 H 220 V 765"/>

        <g class="node gray-node" data-node="validate">
          <rect x="520" y="920" width="200" height="78" rx="8"/>
          <text class="node-title" x="620" y="949">校验目标 Session</text>
          <text class="node-subtitle" x="620" y="975">权限、状态与新鲜度</text>
        </g>

        <g class="node gray-node" data-node="context-bundle">
          <rect class="hidden-card" x="780" y="895" width="270" height="135" rx="8"/>
          <text class="node-title" x="915" y="925">服务端重建 Context Bundle</text>
          <text class="node-subtitle" x="915" y="950">隐藏 · 不作为用户消息显示</text>
          <text class="small-label" x="805" y="975">Project / Item 最新状态</text>
          <text class="small-label" x="805" y="997">相关 Event、目标 Session</text>
          <text class="small-label" x="805" y="1019">Memory 与约束</text>
        </g>

        <g class="node green-node" data-node="agent">
          <rect x="1110" y="920" width="150" height="78" rx="8"/>
          <text class="node-title" x="1185" y="949">AgentV3</text>
          <text class="node-subtitle" x="1185" y="975">执行建议动作</text>
        </g>

        <g class="node green-node" data-node="output">
          <rect x="1320" y="920" width="205" height="78" rx="8"/>
          <text class="node-title" x="1422" y="949">草稿 / 计划 / 清单</text>
          <text class="node-subtitle" x="1422" y="975">总结或其他目标产物</text>
        </g>

        <path class="flow" d="M 750 829 V 870 H 620 V 920"/>
        <path class="flow" d="M 720 959 H 780"/>
        <path class="flow" d="M 1050 959 H 1110"/>
        <path class="flow" d="M 1260 959 H 1320"/>

        <g class="node blue-node" data-node="new-event">
          <rect x="930" y="1065" width="245" height="40" rx="7"/>
          <text class="node-title" x="1052" y="1091">创建新的 Activity Event</text>
        </g>

        <g class="node green-node" data-node="radar-feedback">
          <rect x="1320" y="1065" width="205" height="40" rx="7"/>
          <text class="node-title" x="1422" y="1091">Radar 状态与反馈</text>
        </g>

        <path class="flow" data-edge="output-to-new-event" d="M 1370 998 V 1038 H 1052 V 1065"/>
        <path class="flow" data-edge="output-to-feedback" d="M 1470 998 V 1065"/>
        <path class="flow-green" data-edge="new-event-to-organizer" d="M 930 1085 H 10 V 640 H 425 V 580"/>
        <text class="arrow-label" x="500" y="1118">Radar Action Run：更新状态，不再生成 Radar</text>
      </svg>
    </section>
  </main>

  <script>
    const diagram = document.getElementById('diagram');
    const fitButton = document.getElementById('fitButton');
    let fitted = true;

    fitButton.addEventListener('click', () => {
      fitted = !fitted;
      diagram.style.width = fitted ? '100%' : '1600px';
      fitButton.textContent = fitted ? '适应窗口' : '原始尺寸';
    });
  </script>
</body>
</html>
